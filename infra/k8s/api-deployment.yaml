apiVersion: apps/v1
kind: Deployment
metadata:
  name: climate-api
  namespace: climate-platform
  labels:
    app: climate-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: climate-api
  template:
    metadata:
      labels:
        app: climate-api
    spec:
      containers:
        - name: api
          image: ghcr.io/OWNER/climate-platform-api:latest   # replaced by CI
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: APP_ENV
              value: production
            - name: LOG_LEVEL
              value: INFO
            - name: H3_RESOLUTION
              value: "8"
          envFrom:
            - secretRef:
                name: climate-platform-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests:
              cpu:    "250m"
              memory: "512Mi"
            limits:
              cpu:    "1000m"
              memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: climate-api
  namespace: climate-platform
spec:
  selector:
    app: climate-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: climate-api-hpa
  namespace: climate-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: climate-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
