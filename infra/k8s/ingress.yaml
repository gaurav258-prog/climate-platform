# Ingress — requires nginx-ingress-controller + cert-manager installed in cluster.
# Replace HOST with your actual domain.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: climate-api-ingress
  namespace: climate-platform
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.climate-intelligence.platform   # CHANGE ME
      secretName: climate-api-tls
  rules:
    - host: api.climate-intelligence.platform  # CHANGE ME
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: climate-api
                port:
                  number: 80
