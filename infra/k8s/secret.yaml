# Secret template — DO NOT commit real values.
# In production, inject via CI/CD (GitHub Actions secret → kubectl create secret)
# or use a secrets manager (AWS Secrets Manager, GCP Secret Manager, Vault).
#
# To create from CLI:
#   kubectl create secret generic climate-platform-secrets \
#     --from-literal=DATABASE_URL="postgresql://..." \
#     --from-literal=FIRMS_API_KEY="..." \
#     --from-literal=COPERNICUS_USER="..." \
#     --from-literal=COPERNICUS_PASSWORD="..." \
#     -n climate-platform
apiVersion: v1
kind: Secret
metadata:
  name: climate-platform-secrets
  namespace: climate-platform
type: Opaque
stringData:
  DATABASE_URL:         "postgresql://platform:CHANGE_ME@db-host:5432/climate"
  MLFLOW_TRACKING_URI:  "http://mlflow:5001"
  FIRMS_API_KEY:        ""
  COPERNICUS_USER:      ""
  COPERNICUS_PASSWORD:  ""
