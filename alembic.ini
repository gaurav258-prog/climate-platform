[alembic]
script_location = core/db/migrations
file_template = %%(rev)s_%%(slug)s
prepend_sys_path = .

# URL overridden by env.py reading DATABASE_URL from .env
sqlalchemy.url = postgresql://platform:devpassword@localhost:5432/climate

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
