name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.9"
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:

  # ── Unit tests (no DB required) ────────────────────────────────────────
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest tests/unit/ -m "not integration" -q --tb=short

  # ── Integration tests (TimescaleDB sidecar) ────────────────────────────
  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: unit-tests

    services:
      db:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_DB:       climate
          POSTGRES_USER:     platform
          POSTGRES_PASSWORD: devpassword
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U platform -d climate"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://platform:devpassword@localhost:5433/climate

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run Alembic migrations
        run: alembic upgrade head

      - name: Run integration tests
        run: pytest tests/unit/ -m "integration" -q --tb=short

  # ── Lint ───────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check . --select E,F,W,I --ignore E501

  # ── Docker build + push (main branch only) ─────────────────────────────
  build-push:
    name: Build & push image
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, lint]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/Dockerfile
          target: api
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}-api:latest
            ${{ env.IMAGE_NAME }}-api:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build and push worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/Dockerfile
          target: worker
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}-worker:latest
            ${{ env.IMAGE_NAME }}-worker:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ── Deploy to Kubernetes (main branch only) ────────────────────────────
  deploy:
    name: Deploy to k8s
    runs-on: ubuntu-latest
    needs: build-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production   # requires manual approval gate in GitHub settings

    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: echo "${{ secrets.KUBECONFIG }}" | base64 -d > /tmp/kubeconfig

      - name: Update image tags in manifests
        run: |
          sed -i "s|:latest|:${{ github.sha }}|g" infra/k8s/api-deployment.yaml
          sed -i "s|:latest|:${{ github.sha }}|g" infra/k8s/scorer-cronjob.yaml
          sed -i "s|OWNER|${{ github.repository_owner }}|g" infra/k8s/api-deployment.yaml
          sed -i "s|OWNER|${{ github.repository_owner }}|g" infra/k8s/scorer-cronjob.yaml

      - name: Apply manifests
        env:
          KUBECONFIG: /tmp/kubeconfig
        run: |
          kubectl apply -f infra/k8s/namespace.yaml
          kubectl apply -f infra/k8s/secret.yaml        # pre-created in cluster
          kubectl apply -f infra/k8s/api-deployment.yaml
          kubectl apply -f infra/k8s/scorer-cronjob.yaml
          kubectl apply -f infra/k8s/ingress.yaml

      - name: Wait for rollout
        env:
          KUBECONFIG: /tmp/kubeconfig
        run: |
          kubectl rollout status deployment/climate-api \
            -n climate-platform --timeout=120s
